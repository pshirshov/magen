mapping:
  - id: "EditorCodeBlockEnd"
    binding:
      macos: "meta+alt+[BracketRight]"
      default: "ctrl+alt+[BracketRight]"
    idea:
      action: "EditorCodeBlockEnd"
    vscode:
      missing: true
    zed:
      missing: true
  - id: "EditorCodeBlockStart"
    binding:
      macos: "meta+alt+[BracketLeft]"
      default: "ctrl+alt+[BracketLeft]"
    idea:
      action: "EditorCodeBlockStart"
    vscode:
      missing: true
    zed:
      missing: true
  - id: "EditorScrollToCenter"
    binding:
      - "ctrl+[KeyL]"
    idea:
      action: "EditorScrollToCenter"
    vscode:
      missing: true
    zed:
      missing: true
