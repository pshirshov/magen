mapping:
  - id: "ActivateCommitToolWindow"
    binding:
      macos: "meta+0"
      default: "ctrl+0"
    idea:
      action: "ActivateCommitToolWindow"
    vscode:
      action: "workbench.view.scm"
    zed:
      missing: true
  - id: "ActivateDebugToolWindow"
    binding:
      macos: "meta+5"
      default: "ctrl+5"
    idea:
      action: "ActivateDebugToolWindow"
    vscode:
      action: "workbench.view.debug"
    zed:
      missing: true
  - id: "ActivateFindToolWindow"
    binding:
      macos: "meta+3"
      default: "ctrl+3"
    idea:
      action: "ActivateFindToolWindow"
    vscode:
      action: "workbench.view.search"
    zed:
      missing: true
  - id: "ActivateProblemsViewToolWindow"
    binding:
      macos: "meta+6"
      default: "ctrl+6"
    idea:
      action: "ActivateProblemsViewToolWindow"
    vscode:
      action: "workbench.actions.view.problems"
    zed:
      action: "diagnostics::Deploy"
      context: ["Workspace"]
  - id: "ActivateProjectToolWindow"
    binding:
      macos: "meta+1"
      default: "ctrl+1"
    idea:
      action: "ActivateProjectToolWindow"
    vscode:
      action: "workbench.view.explorer"
    zed:
      action: "project_panel::ToggleFocus"
      context: ["Workspace"]
  - id: "ActivateRunToolWindow"
    binding:
      macos: "meta+4"
      default: "ctrl+4"
    idea:
      action: "ActivateRunToolWindow"
    vscode:
      action: "workbench.action.output.toggleOutput"
    zed:
      missing: true
  - id: "ActivateStructureToolWindow"
    binding:
      macos: "meta+7"
      default: "ctrl+7"
    idea:
      action: "ActivateStructureToolWindow"
    vscode:
      missing: true
    zed:
      action: "outline_panel::ToggleFocus"
      context: ["Workspace"]
  - id: "ActivateVersionControlToolWindow"
    binding:
      macos: "meta+9"
      default: "ctrl+9"
    idea:
      action: "ActivateVersionControlToolWindow"
    vscode:
      action: "workbench.view.scm"
    zed:
      missing: true
  - id: "EditorDecreaseFontSizeGlobal"
    binding:
      - "ctrl+shift+[Comma]"
    idea:
      action: "EditorDecreaseFontSizeGlobal"
    vscode:
      action: "workbench.action.zoomOut"
    zed:
      action: "zed::DecreaseBufferFontSize"
      context: ["Workspace"]
  - id: "EditorIncreaseFontSizeGlobal"
    binding:
      - "ctrl+shift+[Period]"
    idea:
      action: "EditorIncreaseFontSizeGlobal"
    vscode:
      action: "workbench.action.zoomIn"
    zed:
      action: "zed::IncreaseBufferFontSize"
      context: ["Workspace"]
  - id: "ResetIdeScaleAction"
    binding:
      - "ctrl+alt+0"
    idea:
      action: "ResetIdeScaleAction"
    vscode:
      action: "workbench.action.zoomReset"
    zed:
      action: "zed::ResetBufferFontSize"
      context: ["Workspace"]
  - id: "ShowSettings"
    binding:
      macos: "meta+[Comma]"
      default: "ctrl+[Comma]"
    idea:
      action: "ShowSettings"
    vscode:
      action: "workbench.action.openSettings"
    zed:
      action: "zed::OpenSettings"
      context: ["Workspace"]
  - id: "ToggleFullScreen"
    binding:
      macos: "meta+ctrl+[KeyF]"
      default: "alt+ctrl+[KeyF]"
    idea:
      action: "ToggleFullScreen"
    vscode:
      action: "workbench.action.toggleFullScreen"
    zed:
      action: "zed::ToggleFullScreen"
      context: ["Workspace"]
  - id: "ZoomInIdeAction"
    binding:
      - "ctrl+alt+[Equal]"
    idea:
      action: "ZoomInIdeAction"
    vscode:
      action: "workbench.action.zoomIn"
    zed:
      action: "zed::IncreaseBufferFontSize"
      context: ["Workspace"]
  - id: "ZoomOutIdeAction"
    binding:
      - "ctrl+alt+[Minus]"
    idea:
      action: "ZoomOutIdeAction"
    vscode:
      action: "workbench.action.zoomOut"
    zed:
      action: "zed::DecreaseBufferFontSize"
      context: ["Workspace"]
  - id: "ActivateTerminalToolWindow"
    binding:
      - "alt+[F12]"
    idea:
      action: "ActivateTerminalToolWindow"
    vscode:
      action: "workbench.action.terminal.toggleTerminal"
    zed:
      action: "terminal_panel::Toggle"
      context: ["Workspace"]
  - id: "Terminal.NewTab"
    binding:
      macos: "meta+[KeyT]"
      default: "ctrl+[KeyT]"
    idea:
      action: "Terminal.NewTab"
    vscode:
      action: "workbench.action.terminal.new"
      context: ["terminalFocus"]
    zed:
      action: "workspace::NewTerminal"
      context: ["Terminal"]
  - id: "HideSideWindows"
    binding:
      macos: "meta+shift+[F12]"
      default: "ctrl+shift+[F12]"
    idea:
      action: "HideSideWindows"
    vscode:
      action: "workbench.action.toggleSidebarVisibility"
    zed:
      action: "workspace::ToggleLeftDock"
      context: ["Workspace"]
  - id: "EditorToggleUseSoftWraps"
    binding:
      macos: "meta+shift+[KeyW]"
      default: "ctrl+shift+[KeyW]"
    idea:
      action: "EditorToggleUseSoftWraps"
    vscode:
      action: "editor.action.toggleWordWrap"
    zed:
      action: "editor::ToggleSoftWrap"
      context: ["Editor"]
  - id: "SplitVertically"
    binding:
      macos: "meta+shift+[KeyV]"
      default: "ctrl+shift+[KeyV]"
    idea:
      action: "SplitVertically"
    vscode:
      action: "workbench.action.splitEditorRight"
    zed:
      action: "pane::SplitRight"
      context: ["Pane"]
