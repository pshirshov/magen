mapping:
  - id: "EditorDown"
    binding:
      - "[down]"
      - "ctrl+[KeyN]"
    idea:
      action: "EditorDown"
    vscode:
      action: "cursorDown"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveDown"
      context: ["Editor"]
  - id: "EditorLeft"
    binding:
      - "[left]"
      - "ctrl+[KeyB]"
    idea:
      action: "EditorLeft"
    vscode:
      action: "cursorLeft"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveLeft"
      context: ["Editor"]
  - id: "EditorLineEnd"
    binding:
      - "meta+[right]"
      - "[end]"
      - "ctrl+[KeyE]"
    idea:
      action: "EditorLineEnd"
    vscode:
      action: "cursorEnd"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveToEndOfLine"
      context: ["Editor"]
  - id: "EditorLineStart"
    binding:
      - "meta+[left]"
      - "[home]"
      - "ctrl+[KeyA]"
    idea:
      action: "EditorLineStart"
    vscode:
      action: "cursorHome"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveToBeginningOfLine"
      context: ["Editor"]
  - id: "EditorMatchBrace"
    binding:
      - "ctrl+[KeyM]"
    idea:
      action: "EditorMatchBrace"
    vscode:
      action: "editor.action.jumpToBracket"
      context: ["editorTextFocus"]
    zed:
      action: "editor::MoveToEnclosingBracket"
      context: ["Editor"]
  - id: "EditorNextWord"
    binding:
      - "alt+[right]"
      - "ctrl+alt+[KeyF]"
    idea:
      action: "EditorNextWord"
    vscode:
      action: "cursorWordEndRight"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveToNextWordEnd"
      context: ["Editor"]
  - id: "EditorPreviousWord"
    binding:
      - "alt+[left]"
      - "ctrl+alt+[KeyB]"
    idea:
      action: "EditorPreviousWord"
    vscode:
      action: "cursorWordLeft"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveToPreviousWordStart"
      context: ["Editor"]
  - id: "EditorRight"
    binding:
      - "[right]"
      - "ctrl+[KeyF]"
    idea:
      action: "EditorRight"
    vscode:
      action: "cursorRight"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveRight"
      context: ["Editor"]
  - id: "EditorUp"
    binding:
      - "[up]"
      - "ctrl+[KeyP]"
    idea:
      action: "EditorUp"
    vscode:
      action: "cursorUp"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveUp"
      context: ["Editor"]
  - id: "EditorPageDown"
    binding:
      - "[pagedown]"
    idea:
      action: "EditorPageDown"
    vscode:
      action: "cursorPageDown"
      context: ["textInputFocus"]
    zed:
      action: "editor::PageDown"
      context: ["Editor"]
  - id: "EditorPageUp"
    binding:
      - "[pageup]"
    idea:
      action: "EditorPageUp"
    vscode:
      action: "cursorPageUp"
      context: ["textInputFocus"]
    zed:
      action: "editor::PageUp"
      context: ["Editor"]
  - id: "EditorTextStart"
    binding:
      - "meta+[home]"
    idea:
      action: "EditorTextStart"
    vscode:
      action: "cursorTop"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveToBeginning"
      context: ["Editor"]
  - id: "EditorTextEnd"
    binding:
      - "meta+[end]"
    idea:
      action: "EditorTextEnd"
    vscode:
      action: "cursorBottom"
      context: ["textInputFocus"]
    zed:
      action: "editor::MoveToEnd"
      context: ["Editor"]
