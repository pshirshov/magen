mapping:
  - id: "CloseActiveTab"
    binding:
      - "ctrl+shift+[F4]"
    idea:
      action: "CloseActiveTab"
    vscode:
      action: "workbench.action.closeActiveEditor"
    zed:
      action: "pane::CloseActiveItem"
      context: ["Pane"]
  - id: "CloseContent"
    binding:
      - "meta+[KeyW]"
    idea:
      action: "CloseContent"
    vscode:
      action: "workbench.action.closeActiveEditor"
    zed:
      action: "pane::CloseActiveItem"
      context: ["Pane"]
  - id: "Exit"
    binding:
      - "meta+[KeyQ]"
    idea:
      action: "Exit"
    vscode:
      action: "workbench.action.quit"
    zed:
      action: "zed::Quit"
      context: ["Workspace"]
  - id: "NewScratchFile"
    binding:
      - "meta+shift+[KeyN]"
    idea:
      action: "NewScratchFile"
    vscode:
      action: "workbench.action.files.newUntitledFile"
    zed:
      action: "workspace::NewFile"
      context: ["Workspace"]
  - id: "Rerun"
    binding:
      - "meta+[KeyR]"
    idea:
      action: "Rerun"
    vscode:
      action: "workbench.action.debug.restart"
    zed:
      missing: true
  - id: "Run"
    binding:
      - "ctrl+[KeyR]"
    idea:
      action: "Run"
    vscode:
      action: "workbench.action.debug.run"
    zed:
      missing: true
  - id: "SaveAll"
    binding:
      - "meta+[KeyS]"
    idea:
      action: "SaveAll"
    vscode:
      action: "workbench.action.files.save"
    zed:
      action: "workspace::Save"
      context: ["Workspace"]
  - id: "SaveAllFiles"
    binding:
      - "meta+shift+[KeyS]"
    idea:
      action: "SaveAll"
    vscode:
      action: "workbench.action.files.saveAll"
    zed:
      action: "workspace::SaveAll"
      context: ["Workspace"]
  - id: "CloseProject"
    binding:
      - "meta+shift+[KeyW]"
    idea:
      action: "CloseProject"
    vscode:
      action: "workbench.action.closeWindow"
    zed:
      action: "workspace::CloseWindow"
      context: ["Workspace"]
  - id: "ReopenClosedTab"
    binding:
      - "meta+shift+[KeyT]"
    idea:
      action: "ReopenClosedTab"
    vscode:
      action: "workbench.action.reopenClosedEditor"
    zed:
      action: "pane::ReopenClosedItem"
      context: ["Pane"]
  - id: "CloseAllEditorsButActive"
    binding:
      - "meta+alt+[KeyW]"
    idea:
      action: "CloseAllEditorsButActive"
    vscode:
      action: "workbench.action.closeOtherEditors"
    zed:
      action: "pane::CloseOtherItems"
      context: ["Pane"]
